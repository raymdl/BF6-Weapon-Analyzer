name: Update Header Date

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-header-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/update-header-date.mjs
      - name: Commit updated date
        run: |
          if git diff --quiet -- index.html; then
            echo "Header date already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update header date"
          git push
